# This is an example ngrok configuration file.
# You should copy the contents below into your real ngrok.yml file,
# which is located at C:\Users\User\AppData\Local\ngrok\ngrok.yml
#
# Make sure to preserve your existing 'version' and 'authtoken' lines if you have them.

# You should already have these lines from when you set up ngrok.
# If not, add your authtoken from https://dashboard.ngrok.com/get-started/your-authtoken
version: "2"
# authtoken: YOUR_TOKEN_GOES_HERE

tunnels:
  next-app:
    proto: http
    addr: 3000
  socket-server:
    proto: http
    addr: 3001 